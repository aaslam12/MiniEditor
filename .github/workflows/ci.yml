name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }} / ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup toolchain - Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential python3 catch2
      - name: Setup toolchain - macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja python catch2
      - name: Setup toolchain - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command ninja -ErrorAction SilentlyContinue) {
            ninja --version
          } else {
            Write-Host 'ninja not found, attempting choco install...'
            try {
              choco install -y ninja
            } catch {
              Write-Host 'choco install failed or ninja package not available; continuing and hoping ninja is preinstalled.'
            }
          }
          # CMake is preinstalled on windows-latest; ensure ninja in PATH
          try {
            & choco install -y catch2
            if ($LASTEXITCODE -ne 0) {
              Write-Host 'catch2 choco install returned non-zero exit code; continuing and relying on CMake FetchContent fallback.'
            }
          } catch {
            Write-Host 'Note: Catch2 installation via choco threw an exception; continuing and relying on CMake FetchContent fallback.'
          }

      - name: Configure (CMake) - Linux/macOS
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
                -DMINIEDITOR_BUILD_TESTS=$([[ "${{ matrix.config }}" == "Debug" ]] && echo "ON" || echo "OFF") \
                -DMINIEDITOR_STATIC_LINKING=OFF

      - name: Configure (CMake) - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
          $tests = if ('${{ matrix.config }}' -eq 'Debug') { 'ON' } else { 'OFF' }
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE='${{ matrix.config }}' -DMINIEDITOR_BUILD_TESTS=$tests -DMINIEDITOR_STATIC_LINKING=OFF

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          cmake --build build --config ${{ matrix.config }} --parallel $NPROC
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $n = $env:NUMBER_OF_PROCESSORS
          if (-not $n) { $n = 2 }
          cmake --build build --config ${{ matrix.config }} --parallel $n

      - name: Run unit tests (Debug)
        if: matrix.config == 'Debug'
        run: |
          # If CTest is configured this will run tests added by add_test
          cmake --build build --target tests
          ctest --test-dir build --output-on-failure

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -Force package
          $exe = "build\${{ matrix.config }}\minieditor.exe"
          if (Test-Path $exe) { Copy-Item $exe package\ }
          else { Copy-Item build\minieditor.exe package\ -ErrorAction SilentlyContinue }
          Compress-Archive -Path package\* -DestinationPath minieditor-${{ matrix.os }}-${{ matrix.config }}.zip

      - name: Package binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package
          # Linux/macOS: try single-config build output, fallback to common locations
          cp build/minieditor package/ 2>/dev/null || cp build/${{ matrix.config }}/minieditor package/ 2>/dev/null || true
          tar -C package -czf minieditor-${{ matrix.os }}-${{ matrix.config }}.tar.gz .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minieditor-${{ matrix.os }}-${{ matrix.config }}
          path: |
            minieditor-${{ matrix.os }}-${{ matrix.config }}.zip
            minieditor-${{ matrix.os }}-${{ matrix.config }}.tar.gz
